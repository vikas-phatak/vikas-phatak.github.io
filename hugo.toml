baseURL = "https://vikas-phatak.github.io/"
title = "Vikas Phatak | Engineering & AI Blog"
theme = "PaperMod"
locale = "en-US"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableInlineShortcodes = true
buildDrafts = false
buildFuture = false
buildExpired = false
paginate = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "Vikas Phatak | Engineering & AI Blog"
  description = "Technical deep-dives into autonomous agent orchestration, AI systems, and modern software architecture."
  keywords = ["AI", "Agents", "Python", "Hugo", "LangGraph", "Software Architecture", "DevOps"]
  author = "Vikas Phatak"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  [params.label]
    text = "Vikas Phatak"
    icon = ""
    iconHeight = 35

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/vikas-phatak"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/vikas-phatak"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[privacy]
  [privacy.googleAnalytics]
    anonymizeIP = true
